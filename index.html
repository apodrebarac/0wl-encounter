<script>
  const poems = JSON.parse(document.getElementById('poems-data').textContent);

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const shuffled = shuffle([...poems]);
  let index = 0;
  let typing = false;
  let typeTimeout = null;
  let fadeTimeout = null;
  let interacted = false;

  const poemEl   = document.getElementById('poem');
  const titleEl  = document.getElementById('poem-title');
  const bodyEl   = document.getElementById('poem-body');
  const hintEl   = document.getElementById('hint');
  const cursorEl = document.getElementById('cursor');
  const stage    = document.getElementById('stage');

  function clearTimers() {
    clearTimeout(typeTimeout);
    clearTimeout(fadeTimeout);
  }

  function typeText(el, text, i, callback) {
    if (i > text.length) {
      if (callback) callback();
      return;
    }
    el.textContent = text.slice(0, i);
    el.appendChild(cursorEl);

    const ch = text[i - 1];
    let delay = 18;
    if (ch === '\n') delay = 90;
    else if (ch === ' ') delay = 25;
    else if (ch === ',') delay = 60;
    else if (ch === '.') delay = 80;

    typeTimeout = setTimeout(() => typeText(el, text, i + 1, callback), delay);
  }

  function showPoem() {
    typing = true;
    const raw = shuffled[index % shuffled.length];
    index++;

    const nlIdx = raw.indexOf('\n');
    const title = nlIdx >= 0 ? raw.slice(0, nlIdx) : raw;
    const body  = nlIdx >= 0 ? raw.slice(nlIdx + 1) : '';

    poemEl.classList.remove('hidden');
    titleEl.textContent = '';
    bodyEl.textContent  = '';
    bodyEl.appendChild(cursorEl);

    typeText(titleEl, title, 1, () => {
      if (body) {
        bodyEl.appendChild(cursorEl);
        typeText(bodyEl, body, 1, () => {
          typing = false;
          cursorEl.remove();
          fadeTimeout = setTimeout(() => fadeOut(), 9000);
        });
      } else {
        typing = false;
        cursorEl.remove();
        fadeTimeout = setTimeout(() => fadeOut(), 9000);
      }
    });
  }

  function fadeOut() {
    clearTimers();
    typing = false;
    poemEl.classList.add('hidden');
    setTimeout(() => {
      poemEl.classList.remove('hidden');
      titleEl.textContent = '';
      bodyEl.textContent  = '';
      bodyEl.appendChild(cursorEl);
      showPoem();
    }, 1900);
  }

  function handleInteraction(e) {
    e.preventDefault();
    if (!interacted) {
      interacted = true;
      hintEl.classList.add('gone');
    }
    if (typing) {
      clearTimers();
      typing = false;
      const raw = shuffled[(index - 1) % shuffled.length];
      const nlIdx = raw.indexOf('\n');
      titleEl.textContent = nlIdx >= 0 ? raw.slice(0, nlIdx) : raw;
      bodyEl.textContent  = nlIdx >= 0 ? raw.slice(nlIdx + 1) : '';
      fadeTimeout = setTimeout(() => fadeOut(), 9000);
      return;
    }
    fadeOut();
  }

  stage.addEventListener('click', handleInteraction);
  stage.addEventListener('touchend', handleInteraction, { passive: false });

  showPoem();
</script>
